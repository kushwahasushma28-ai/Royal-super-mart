<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harpriya Son's | Smart Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { emerald: '#043927', gold: '#C5A059', alabaster: '#F9F9F9' },
                    fontFamily: { playfair: ['"Playfair Display"', 'serif'], inter: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-alabaster font-inter text-emerald antialiased p-8 md:p-16">

    <div class="mb-12 flex justify-between items-end">
        <div>
            <h2 class="font-playfair text-4xl font-semibold mb-2">The Fresh Market</h2>
            <p class="text-gray-500 font-light text-sm tracking-wide uppercase">Directly from our partner farms</p>
        </div>
        <div class="flex items-center gap-2 font-medium text-emerald">
            <span class="text-xl">🛍️</span>
            <span id="cart-counter" class="bg-gold text-emerald rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">0</span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-12">
        
        <article class="product-card group cursor-pointer relative flex flex-col">
            <div class="relative overflow-hidden bg-gray-100 aspect-[4/5] mb-4">
                <img src="https://images.unsplash.com/photo-1590165482129-1b8b27698780?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Heirloom Tomatoes" class="product-image w-full h-full object-cover transition-transform duration-700 ease-in-out group-hover:scale-105">
                
                <div class="product-overlay absolute inset-0 bg-emerald/80 flex flex-col justify-end p-6 opacity-0 transition-opacity duration-300 ease-in-out">
                    
                    <div class="transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 ease-in-out delay-75">
                        <div class="flex flex-wrap gap-2 mb-4">
                            <span class="text-xs text-alabaster border border-alabaster/30 px-2 py-1 rounded-sm">Organic</span>
                            <span class="text-xs text-alabaster border border-alabaster/30 px-2 py-1 rounded-sm">Locally Grown</span>
                            <span class="text-xs text-alabaster border border-alabaster/30 px-2 py-1 rounded-sm">High Vitamin C</span>
                        </div>
                        
                        <button class="quick-add-btn w-full bg-gold text-emerald font-semibold py-3 flex justify-center items-center gap-2 hover:bg-alabaster transition-colors duration-200">
                            <span class="btn-text">Quick Add</span>
                            <span class="btn-icon">＋</span>
                        </button>
                    </div>
                </div>
                
                <div class="absolute top-4 right-4 bg-alabaster px-3 py-1 text-xs font-semibold shadow-sm text-emerald">
                    🇮🇳 UP, India
                </div>
            </div>

            <div class="flex justify-between items-start">
                <div>
                    <h3 class="font-playfair text-xl font-semibold mb-1">Heirloom Tomatoes</h3>
                    <p class="text-gray-500 text-sm font-light">Farm: Green Valley Organics</p>
                </div>
                <div class="text-right">
                    <p class="font-medium text-lg">₹340</p>
                    <p class="text-xs text-gray-400">per kg</p>
                </div>
            </div>
        </article>

        </div>

    <script src="script.js"></script>
</body>
</html>
